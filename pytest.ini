[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
addopts =
    --tb=short
    --strict-markers
    -q
markers =
    unit: pure unit tests (no AWS, no LLM)
    integration: tests that hit moto-mocked AWS
    e2e: full end-to-end tests requiring real GitHub token and AWS creds
