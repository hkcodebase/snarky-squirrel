version: "3.9"

# Local development stack for PR Review System (v2)
#
# Two LLM backends are supported — pick one:
#
#   A) Ollama  (LLM_PROVIDER=ollama, default)
#      docker-compose --profile ollama up -d
#      python3 scripts/setup_local.py --provider ollama
#
#   B) Docker Model Runner  (LLM_PROVIDER=docker-model, Docker Desktop 4.40+)
#      docker model pull ai/gemma4          # one-time pull
#      docker-compose up -d                 # DynamoDB only — no Ollama needed
#      python3 scripts/setup_local.py --provider docker-model --model ai/gemma4
#
# Direct review (either backend):
#   python3 main.py --diff tests/fixtures/sample.diff
#   python3 main.py --pr-url https://github.com/org/repo/pull/42

services:

  # ── Local DynamoDB ──────────────────────────────────────────────────────────
  # Always started regardless of LLM backend.
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: pr-review-dynamo
    command:
      - -jar
      - DynamoDBLocal.jar
      - -inMemory
      - -sharedDb
    ports:
      - "8000:8000"
    healthcheck:
      # DynamoDB Local returns HTTP 400 for a plain GET / (it speaks the DynamoDB
      # wire protocol, not plain HTTP). Drop -f so curl exits 0 on any HTTP
      # response — only a connection failure (exit 7) counts as unhealthy.
      test: ["CMD-SHELL", "curl -s http://localhost:8000 > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Create the memory table (runs once, exits) ─────────────────────────────
  # Uses `|| true` so it exits cleanly if the table already exists
  # (happens when docker-compose up -d is run again without docker-compose down).
  dynamo-init:
    image: amazon/aws-cli:latest
    container_name: pr-review-dynamo-init
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    entrypoint: >
      /bin/sh -c "
        aws dynamodb create-table
          --table-name pr-review-local-memory
          --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S
          --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE
          --billing-mode PAY_PER_REQUEST
          --endpoint-url http://dynamodb-local:8000
          --region us-east-1
        2>&1 | grep -E 'TableDescription|already exists|ResourceInUseException' && echo 'Table ready.'
        exit 0
      "
    restart: "no"

  # ── Ollama — serves Gemma locally ──────────────────────────────────────────
  # Only started when you add --profile ollama to docker-compose commands.
  # Not needed when using Docker Model Runner (LLM_PROVIDER=docker-model).
  #
  # GPU acceleration: uncomment the deploy section below.
  ollama:
    profiles: [ollama]
    image: ollama/ollama:latest
    container_name: pr-review-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:11434/api/tags > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    # Uncomment for NVIDIA GPU acceleration:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama_data:
    name: pr-review-ollama-models
